name: Build and Publish Docker Images

on:
  push:
    branches:
      - development
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./services/backend
            dockerfile: Dockerfile
            image_suffix: backend
          
          - service: users
            context: ./services/users
            dockerfile: Dockerfile
            image_suffix: users
          
          - service: gateway
            context: .
            dockerfile: ./gateway/Dockerfile # Gateway пока не имеет Dockerfile, использует image: nginx. Исправим это ниже.
            image_suffix: gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Создаем имя образа: ghcr.io/user/repo/service-name
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      # Для Gateway нам нужно создать Dockerfile, если его нет, или использовать готовый image nginx и копировать конфиг
      # В рамках CI проще собрать свой образ с конфигом внутри
      - name: Create Gateway Dockerfile (if needed)
        if: matrix.service == 'gateway'
        run: |
           echo "FROM nginx:alpine" > gateway/Dockerfile
           echo "COPY gateway/nginx.conf /etc/nginx/nginx.conf" >> gateway/Dockerfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
