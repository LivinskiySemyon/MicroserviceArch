services:
  - type: web
    name: fastapi-backend
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: "./services/backend/Dockerfile"
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: fastapi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: fastapi-db
    region: frankfurt
    plan: free
