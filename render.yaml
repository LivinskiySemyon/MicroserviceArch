services:
  - type: web
    name: fastapi-backend
    env: docker
    plan: free
    region: frankfurt
    buildCommand: ""
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    dockerfilePath: "./services/backend/Dockerfile"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fastapi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: fastapi-db
    region: frankfurt
    plan: free
